<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gradient1)" stroke-width="12"/>
  <circle cx="100" cy="100" r="89" fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- 内圈 -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#gradient1)" stroke-width="10"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 保持架 -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#40a9ff" stroke-width="1" opacity="0.5"/>

  <!-- 滚珠 -->
  <g fill="url(#ballGradient)">
    <circle cx="100" cy="24" r="8"/>
    <circle cx="157" cy="48" r="8"/>
    <circle cx="176" cy="100" r="8"/>
    <circle cx="157" cy="152" r="8"/>
    <circle cx="100" cy="176" r="8"/>
    <circle cx="43" cy="152" r="8"/>
    <circle cx="24" cy="100" r="8"/>
    <circle cx="43" cy="48" r="8"/>
  </g>

  <!-- 滚珠高光 -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="98" cy="22" r="3"/>
    <circle cx="155" cy="46" r="3"/>
    <circle cx="174" cy="98" r="3"/>
    <circle cx="155" cy="150" r="3"/>
    <circle cx="98" cy="174" r="3"/>
    <circle cx="41" cy="150" r="3"/>
    <circle cx="22" cy="98" r="3"/>
    <circle cx="41" cy="46" r="3"/>
  </g>

  <!-- 中心孔 -->
  <circle cx="100" cy="100" r="35" fill="#0a0a0f"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1890ff"/>
      <stop offset="50%" stop-color="#40a9ff"/>
      <stop offset="100%" stop-color="#69c0ff"/>
    </linearGradient>
    <radialGradient id="ballGradient" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#69c0ff"/>
      <stop offset="50%" stop-color="#40a9ff"/>
      <stop offset="100%" stop-color="#1890ff"/>
    </radialGradient>
  </defs>
</svg>
