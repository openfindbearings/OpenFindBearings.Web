<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="50%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
  </defs>
  
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="85" fill="url(#metalGrad)" stroke="#888" stroke-width="2"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#999" stroke-width="1" opacity="0.5"/>
  
  <!-- 滚珠 -->
  <g fill="url(#metalGrad)" stroke="#666" stroke-width="1">
    <circle cx="100" cy="45" r="12"/>
    <circle cx="145" cy="70" r="12"/>
    <circle cx="145" cy="130" r="12"/>
    <circle cx="100" cy="155" r="12"/>
    <circle cx="55" cy="130" r="12"/>
    <circle cx="55" cy="70" r="12"/>
  </g>
  
  <!-- 内圈 -->
  <circle cx="100" cy="100" r="45" fill="url(#metalGrad)" stroke="#888" stroke-width="2"/>
  <circle cx="100" cy="100" r="35" fill="none" stroke="#999" stroke-width="1" opacity="0.5"/>
  
  <!-- 中心孔 -->
  <circle cx="100" cy="100" r="20" fill="url(#innerGrad)" stroke="#1a4080" stroke-width="2"/>
  
  <!-- 品牌文字 -->
  <text x="100" y="105" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial">B</text>
</svg>
